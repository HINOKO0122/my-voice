<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultra Low Latency Monitor</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #000; color: #0f0; margin: 0; }
        .card { border: 2px solid #0f0; padding: 2rem; border-radius: 10px; text-align: center; width: 300px; box-shadow: 0 0 20px #0f0; }
        button { width: 100%; padding: 15px; margin: 10px 0; font-size: 1rem; cursor: pointer; border: 1px solid #0f0; background: transparent; color: #0f0; font-weight: bold; }
        button:hover { background: #0f0; color: #000; }
        button:disabled { border-color: #050; color: #050; }
        .info { font-size: 0.8rem; margin-top: 10px; color: #888; text-align: left; }
    </style>
</head>
<body>

<div class="card">
    <h2>Pro Monitor Mode</h2>
    <p style="font-size: 0.8rem;">※自動加工をすべてOFFにしました</p>
    
    <button id="startBtn">START MONITORING</button>
    <button id="reverbBtn" disabled>REVERB: OFF</button>
    
    <div class="info">
        ・Echo Cancellation: OFF<br>
        ・Noise Suppress: OFF<br>
        ・Auto Gain: OFF
    </div>
    <p id="status" style="margin-top:15px;">Ready</p>
</div>

<script>
    let audioContext;
    let microphone;
    let noiseFilter;
    let reverbNode;
    let isReverbOn = false;

    const startBtn = document.getElementById('startBtn');
    const reverbBtn = document.getElementById('reverbBtn');
    const statusText = document.getElementById('status');

    function createReverb(context) {
        const delay = context.createDelay();
        delay.delayTime.value = 0.04;
        const feedback = context.createGain();
        feedback.gain.value = 0.35;
        delay.connect(feedback);
        feedback.connect(delay);
        return delay;
    }

    startBtn.onclick = async () => {
        if (audioContext) return;

        try {
            // 【重要】echoCancellationもあえてOFFにします
            // これにより「音の大小」は消えますが、スピーカーだと即ハウリングします
            const stream = await navigator.mediaDevices.getUserMedia({
                audio: {
                    echoCancellation: false, 
                    noiseSuppression: false,
                    autoGainControl: false,
                    // 遅延を減らすためのヒント
                    latency: 0,
                    sampleRate: 48000
                }
            });

            // AudioContextのバッファサイズを最小にする（interactive指定）
            audioContext = new (window.AudioContext || window.webkitAudioContext)({
                latencyHint: 0, // 最速設定
            });

            microphone = audioContext.createMediaStreamSource(stream);

            // 低音カットフィルター（これだけは雑音対策に残す）
            noiseFilter = audioContext.createBiquadFilter();
            noiseFilter.type = "highpass";
            noiseFilter.frequency.value = 100;

            reverbNode = createReverb(audioContext);

            // 直結して遅延を最小化
            microphone.connect(noiseFilter);
            noiseFilter.connect(audioContext.destination);

            statusText.innerText = "RUNNING (LOW LATENCY)";
            startBtn.disabled = true;
            reverbBtn.disabled = false;

        } catch (err) {
            statusText.innerText = "Error: " + err;
        }
    };

    reverbBtn.onclick = () => {
        if (!isReverbOn) {
            noiseFilter.connect(reverbNode);
            reverbNode.connect(audioContext.destination);
            reverbBtn.innerText = "REVERB: ON";
            isReverbOn = true;
        } else {
            reverbNode.disconnect();
            reverbBtn.innerText = "REVERB: OFF";
            isReverbOn = false;
        }
    };
</script>

</body>
</html>
