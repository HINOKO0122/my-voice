<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Monitor - ハウリング抑制機能付き</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #f0f2f5; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        button { padding: 10px 20px; font-size: 1.2rem; cursor: pointer; border: none; border-radius: 5px; background: #007bff; color: white; transition: 0.3s; }
        button:hover { background: #0056b3; }
        .status { margin-top: 1rem; color: #666; }
        .warning { color: #d9534f; font-weight: bold; margin-bottom: 1rem; }
    </style>
</head>
<body>

<div class="card">
    <h2>ボイスモニター</h2>
    <p class="warning">⚠️ ハウリング防止のため、<br>必ずイヤホンを装着してください。</p>
    <button id="startBtn">マイク入力を開始</button>
    <p id="status" class="status">停止中</p>
</div>

<script>
let audioContext;
let microphone;

const startBtn = document.getElementById('startBtn');
const statusText = document.getElementById('status');

startBtn.onclick = async () => {
    if (audioContext) return;

    try {
        // 途切れ対策1: サンプリングレートを固定し、レイテンシ（遅延）の設定を調整
        const stream = await navigator.mediaDevices.getUserMedia({
            audio: {
                echoCancellation: true,  // ハウリング防止
                noiseSuppression: false, // 途切れの原因になりやすいのでOFFにしてみる
                autoGainControl: true,
                latency: 0.02            // わずかなバッファを持たせて安定させる
            }
        });

        // 途切れ対策2: LatencyHintを 'interactive' (低遅延重視) に設定
        audioContext = new (window.AudioContext || window.webkitAudioContext)({
            latencyHint: 'interactive',
            sampleRate: 44100 // 標準的な音質に固定
        });

        microphone = audioContext.createMediaStreamSource(stream);
        
        // 出力へ接続
        microphone.connect(audioContext.destination);

        statusText.innerText = "🎤 モニター中";
        startBtn.disabled = true;
        startBtn.style.background = "#28a745";

    } catch (err) {
        console.error(err);
        statusText.innerText = "エラーが発生しました。";
    }
};
</script>

</body>
</html>
