<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Monitor - ハウリング抑制機能付き</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #f0f2f5; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        button { padding: 10px 20px; font-size: 1.2rem; cursor: pointer; border: none; border-radius: 5px; background: #007bff; color: white; transition: 0.3s; }
        button:hover { background: #0056b3; }
        .status { margin-top: 1rem; color: #666; }
        .warning { color: #d9534f; font-weight: bold; margin-bottom: 1rem; }
    </style>
</head>
<body>

<div class="card">
    <h2>ボイスモニター</h2>
    <p class="warning">⚠️ ハウリング防止のため、<br>必ずイヤホンを装着してください。</p>
    <button id="startBtn">マイク入力を開始</button>
    <p id="status" class="status">停止中</p>
</div>

<script>
    let audioContext;
    let microphone;

    const startBtn = document.getElementById('startBtn');
    const statusText = document.getElementById('status');

    startBtn.onclick = async () => {
        // すでに起動している場合は何もしない
        if (audioContext) return;

        try {
            // マイクの使用許可を得る + ハウリング抑制オプション
            const stream = await navigator.mediaDevices.getUserMedia({
                audio: {
                    echoCancellation: true, // エコーキャンセラー
                    noiseSuppression: true,  // ノイズ抑制
                    autoGainControl: true    // 自動ゲイン制御
                }
            });

            // 音声処理の開始
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            microphone = audioContext.createMediaStreamSource(stream);

            // スピーカー（出力）に接続
            microphone.connect(audioContext.destination);

            statusText.innerText = "🎤 モニター中（自分の声が聞こえます）";
            startBtn.disabled = true;
            startBtn.innerText = "動作中";
            startBtn.style.background = "#28a745";

        } catch (err) {
            console.error('マイクのアクセスに失敗しました:', err);
            statusText.innerText = "エラー: マイクの使用を許可してください。";
        }
    };
</script>

</body>
</html>
