<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Monitor</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background: #000; color: #0f0; margin: 0; }
        .card { border: 2px solid #0f0; padding: 2rem; border-radius: 10px; text-align: center; width: 320px; box-shadow: 0 0 20px #0f0; }
        button { width: 100%; padding: 12px; margin: 8px 0; font-size: 1rem; cursor: pointer; border: 1px solid #0f0; background: transparent; color: #0f0; font-weight: bold; border-radius: 5px; }
        button:hover:not(:disabled) { background: #0f0; color: #000; }
        button:disabled { border-color: #050; color: #050; cursor: not-allowed; }
        #status { margin-top: 15px; font-weight: bold; color: #ff0; }
        .danger { color: #f00 !important; border-color: #f00 !important; box-shadow: 0 0 30px #f00 !important; }
    </style>
</head>
<body>

<div id="mainCard" class="card">
    <h2>Voice Monitor</h2>
    <p style="font-size: 0.7rem;">Voice Monitor</p>
    
    <button id="startBtn">1. モニター開始</button>
    <button id="reverbBtn" disabled>2. お風呂場モード: OFF</button>
    <button id="recordBtn" disabled>3. 録音スタート</button>
    
    <p id="status">必ずイヤホンかヘッドフォンを使用してください</p>
</div>

<script>
    let audioContext;
    let microphone, lowCut, highCut, reverbNode, masterGain;
    let analyser;
    let isReverbOn = false;
    let isEmergencyStopped = false;

    const startBtn = document.getElementById('startBtn');
    const statusText = document.getElementById('status');
    const mainCard = document.getElementById('mainCard');

    startBtn.onclick = async () => {
        if (audioContext) return;
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false }
            });

            audioContext = new AudioContext();
            microphone = audioContext.createMediaStreamSource(stream);

            // 安全のためのマスターボリューム
            masterGain = audioContext.createGain();
            
            // ハウリング検知用アナライザー
            analyser = audioContext.createAnalyser();
            analyser.fftSize = 256;
            const dataArray = new Float32Array(analyser.frequencyBinCount);

            // フィルター類
            lowCut = audioContext.createBiquadFilter();
            lowCut.type = "highpass"; lowCut.frequency.value = 150;
            highCut = audioContext.createBiquadFilter();
            highCut.type = "lowpass"; highCut.frequency.value = 7000;
            
            reverbNode = createReverb(audioContext);

            // 接続: マイク -> フィルター -> アナライザー -> マスター音量 -> 出力
            microphone.connect(lowCut);
            lowCut.connect(highCut);
            highCut.connect(analyser);
            analyser.connect(masterGain);
            masterGain.connect(audioContext.destination);

            statusText.innerText = "監視中...";
            startBtn.disabled = true;
            document.getElementById('reverbBtn').disabled = false;
            document.getElementById('recordBtn').disabled = false;

            // ハウリング監視ループ
            const checkHowling = () => {
                if (isEmergencyStopped) return;
                analyser.getFloatTimeDomainData(dataArray);
                
                let peak = 0;
                for (let i = 0; i < dataArray.length; i++) {
                    const s = Math.abs(dataArray[i]);
                    if (s > peak) peak = s;
                }

                // 音量が 0.95 (最大値に近い) を超えたら緊急停止
                if (peak > 0.95) {
                    stopEverything("ハウリングを検知して停止しました！");
                }
                requestAnimationFrame(checkHowling);
            };
            checkHowling();

        } catch (err) {
            statusText.innerText = "エラー: " + err.name;
        }
    };

    function stopEverything(msg) {
        isEmergencyStopped = true;
        masterGain.gain.setTargetAtTime(0, audioContext.currentTime, 0.01); // 即座にミュート
        mainCard.classList.add('danger');
        statusText.innerText = msg;
        statusText.style.color = "#f00";
    }

    function createReverb(context) {
        const delay = context.createDelay();
        delay.delayTime.value = 0.04;
        const feedback = context.createGain();
        feedback.gain.value = 0.35;
        delay.connect(feedback);
        feedback.connect(delay);
        return delay;
    }

    // (リバーブと録音のロジックは前回同様ですが、masterGainに接続するように調整してください)
</script>
</body>
</html>
