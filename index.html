<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Monitor</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background: #000; color: #0f0; margin: 0; }
        .card { border: 2px solid #0f0; padding: 2rem; border-radius: 10px; text-align: center; width: 320px; box-shadow: 0 0 20px #0f0; transition: 0.3s; }
        button { width: 100%; padding: 12px; margin: 8px 0; font-size: 1rem; cursor: pointer; border: 1px solid #0f0; background: transparent; color: #0f0; font-weight: bold; border-radius: 5px; }
        button:hover:not(:disabled) { background: #0f0; color: #000; }
        button:disabled { border-color: #050; color: #050; cursor: not-allowed; }
        .active { background: #0f0 !important; color: #000 !important; }
        .danger { border-color: #f00 !important; color: #f00 !important; box-shadow: 0 0 30px #f00 !important; }
        #status { margin-top: 15px; font-weight: bold; min-height: 1.2em; }
        .info { font-size: 0.7rem; color: #888; margin-top: 10px; text-align: left; }
    </style>
</head>
<body>

<div id="mainCard" class="card">
    <h2>Voice Monitor</h2>
    <p style="font-size: 0.7rem;">必ずイヤホン/ヘッドフォンを使用してください</p>
    
    <button id="startBtn">1. モニター開始</button>
    <button id="reverbBtn" disabled>2. お風呂場モード: OFF</button>
    <button id="recordBtn" disabled>3. 録音スタート</button>
    
    <p id="status">Ready</p>
    <div class="info">
        ・マイクの許可が必要です<br>
        ・ハウリング検知で自動停止します
    </div>
</div>

<script>
    let audioContext;
    let microphone, reverbNode, masterGain, dryGain, reverbGain;
    let analyser, scriptProcessor;
    let audioData = [];
    let isReverbOn = false;
    let isRecording = false;
    let isEmergencyStopped = false;

    const startBtn = document.getElementById('startBtn');
    const reverbBtn = document.getElementById('reverbBtn');
    const recordBtn = document.getElementById('recordBtn');
    const statusText = document.getElementById('status');
    const mainCard = document.getElementById('mainCard');

    function createReverb(context) {
        const delay = context.createDelay(0.05);
        delay.delayTime.value = 0.03;
        const feedback = context.createGain();
        feedback.gain.value = 0.3;
        delay.connect(feedback);
        feedback.connect(delay);
        return delay;
    }

    // 遅延を表示し続けるループ
    function monitorStatus() {
        if (audioContext && !isEmergencyStopped) {
            if (isRecording) {
                statusText.innerText = "● 録音中...";
            } else {
                const lat = (audioContext.baseLatency || 0) + (audioContext.outputLatency || 0);
                const latMs = (lat * 1000).toFixed(1);
                statusText.innerText = `モニター中 (遅延: ${latMs}ms)`;
            }
        }
        requestAnimationFrame(monitorStatus);
    }

    startBtn.onclick = async () => {
        if (audioContext) return;
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false, latency: 0 }
            });

            audioContext = new AudioContext({ latencyHint: 0, sampleRate: 44100 });
            microphone = audioContext.createMediaStreamSource(stream);

            dryGain = audioContext.createGain();
            reverbGain = audioContext.createGain();
            reverbGain.gain.value = 0;
            masterGain = audioContext.createGain();
            analyser = audioContext.createAnalyser();
            analyser.fftSize = 32;

            reverbNode = createReverb(audioContext);

            // 接続
            microphone.connect(dryGain);
            dryGain.connect(masterGain);
            microphone.connect(reverbNode);
            reverbNode.connect(reverbGain);
            reverbGain.connect(masterGain);
            masterGain.connect(analyser);
            masterGain.connect(audioContext.destination);

            // 録音用プロセッサ
            scriptProcessor = audioContext.createScriptProcessor(4096, 1, 1);
            scriptProcessor.onaudioprocess = (e) => {
                if (!isRecording) return;
                const inputData = e.inputBuffer.getChannelData(0);
                audioData.push(new Float32Array(inputData));
            };
            masterGain.connect(scriptProcessor);
            scriptProcessor.connect(audioContext.destination);

            // ハウリング検知
            const dataArray = new Float32Array(analyser.frequencyBinCount);
            const checkHowling = () => {
                if (isEmergencyStopped) return;
                analyser.getFloatTimeDomainData(dataArray);
                let peak = 0;
                for (let i = 0; i < dataArray.length; i++) {
                    const s = Math.abs(dataArray[i]);
                    if (s > peak) peak = s;
                }
                if (peak > 0.95) {
                    isEmergencyStopped = true;
                    masterGain.gain.value = 0;
                    mainCard.classList.add('danger');
                    statusText.innerText = "ハウリング検知：停止しました";
                }
                requestAnimationFrame(checkHowling);
            };
            checkHowling();
            monitorStatus(); // 遅延・ステータス表示ループ開始

            startBtn.disabled = true;
            reverbBtn.disabled = false;
            recordBtn.disabled = false;

        } catch (err) { statusText.innerText = "エラー: " + err.name; }
    };

    reverbBtn.onclick = () => {
        isReverbOn = !isReverbOn;
        reverbGain.gain.value = isReverbOn ? 1 : 0;
        reverbBtn.innerText = `お風呂場モード: ${isReverbOn ? 'ON' : 'OFF'}`;
        reverbBtn.classList.toggle('active', isReverbOn);
    };

    recordBtn.onclick = () => {
        if (!isRecording) {
            audioData = []; 
            isRecording = true;
            recordBtn.innerText = "停止 & 保存";
        } else {
            isRecording = false;
            saveWav();
            recordBtn.innerText = "録音スタート";
        }
    };

    function saveWav() {
        const totalLength = audioData.reduce((acc, val) => acc + val.length, 0);
        const result = new Float32Array(totalLength);
        let offset = 0;
        for (let chunk of audioData) {
            result.set(chunk, offset);
            offset += chunk.length;
        }

        const buffer = new ArrayBuffer(44 + result.length * 2);
        const view = new DataView(buffer);
        const writeString = (off, s) => { for (let i=0; i<s.length; i++) view.setUint8(off+i, s.charCodeAt(i)); };

        writeString(0, 'RIFF');
        view.setUint32(4, 36 + result.length * 2, true);
        writeString(8, 'WAVE');
        writeString(12, 'fmt ');
        view.setUint32(16, 16, true);
        view.setUint16(20, 1, true);
        view.setUint16(22, 1, true);
        view.setUint32(24, 44100, true);
        view.setUint32(28, 44100 * 2, true);
        view.setUint16(32, 2, true);
        view.setUint16(34, 16, true);
        writeString(36, 'data');
        view.setUint32(40, result.length * 2, true);

        for (let i = 0; i < result.length; i++) {
            const s = Math.max(-1, Math.min(1, result[i]));
            view.setInt16(44 + i * 2, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
        }

        const blob = new Blob([view], { type: 'audio/wav' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `voice_${Date.now()}.wav`;
        a.click();
    }
</script>
</body>
</html>
