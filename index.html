<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Monitor</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #000; color: #0f0; margin: 0; }
        .card { border: 2px solid #0f0; padding: 2rem; border-radius: 10px; text-align: center; width: 320px; box-shadow: 0 0 20px #0f0; }
        button { width: 100%; padding: 12px; margin: 8px 0; font-size: 1rem; cursor: pointer; border: 1px solid #0f0; background: transparent; color: #0f0; font-weight: bold; border-radius: 5px; }
        button:hover:not(:disabled) { background: #0f0; color: #000; }
        button:disabled { border-color: #050; color: #050; cursor: not-allowed; }
        .rec-active { border-color: #f00; color: #f00; box-shadow: 0 0 10px #f00; }
        .info { font-size: 0.7rem; margin-top: 10px; color: #888; text-align: left; line-height: 1.5; }
        #status { margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>Voice Monitor</h2>
    <p style="font-size: 0.7rem; color: #aaa;">必ずイヤホンを使用してください</p>
    
    <button id="startBtn">1. モニター開始</button>
    <button id="reverbBtn" disabled>2. お風呂場モード: OFF</button>
    <button id="recordBtn" disabled>3. 録音スタート</button>
    
    <div class="info">
        ・Low-cut (150Hz): ON<br>
        ・High-cut (7kHz): ON<br>
        ・Raw Input Mode: ON
    </div>
    <p id="status">Ready</p>
</div>

<script>
    let audioContext;
    let microphone;
    let lowCut; 
    let highCut;
    let reverbNode;
    let isReverbOn = false;
    let mediaRecorder;
    let audioChunks = [];
    let isRecording = false;

    const startBtn = document.getElementById('startBtn');
    const reverbBtn = document.getElementById('reverbBtn');
    const recordBtn = document.getElementById('recordBtn');
    const statusText = document.getElementById('status');

    function createReverb(context) {
        const delay = context.createDelay();
        delay.delayTime.value = 0.04;
        const feedback = context.createGain();
        feedback.gain.value = 0.35;
        delay.connect(feedback);
        feedback.connect(delay);
        return delay;
    }

    startBtn.onclick = async () => {
        if (audioContext) return;
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                audio: {
                    echoCancellation: false, 
                    noiseSuppression: false,
                    autoGainControl: false,
                    latency: 0
                }
            });

            audioContext = new (window.AudioContext || window.webkitAudioContext)({ latencyHint: 0 });
            microphone = audioContext.createMediaStreamSource(stream);

            // 【対策1】低い「ブーン」をカット
            lowCut = audioContext.createBiquadFilter();
            lowCut.type = "highpass";
            lowCut.frequency.value = 150; 

            // 【対策2】高い「サー」をカット
            highCut = audioContext.createBiquadFilter();
            highCut.type = "lowpass";
            highCut.frequency.value = 7000; 

            reverbNode = createReverb(audioContext);

            // 接続: マイク -> 低音カット -> 高音カット -> 出力
            microphone.connect(lowCut);
            lowCut.connect(highCut);
            highCut.connect(audioContext.destination);

            // 録音設定
            const destination = audioContext.createMediaStreamDestination();
            highCut.connect(destination);
            reverbNode.connect(destination);
            mediaRecorder = new MediaRecorder(destination.stream);
            
            mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(audioChunks, { type: 'audio/wav' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `voice_${Date.now()}.wav`;
                a.click();
                audioChunks = [];
            };

            statusText.innerText = "RUNNING";
            startBtn.disabled = true;
            reverbBtn.disabled = false;
            recordBtn.disabled = false;

        } catch (err) {
            statusText.innerText = "Error: " + err;
        }
    };

    reverbBtn.onclick = () => {
        if (!isReverbOn) {
            highCut.connect(reverbNode);
            reverbNode.connect(audioContext.destination);
            reverbBtn.innerText = "お風呂場モード: ON";
            isReverbOn = true;
        } else {
            reverbNode.disconnect();
            reverbBtn.innerText = "お風呂場モード: OFF";
            isReverbOn = false;
        }
    };

    recordBtn.onclick = () => {
        if (!isRecording) {
            mediaRecorder.start();
            isRecording = true;
            recordBtn.innerText = "停止 & 保存";
            recordBtn.classList.add('rec-active');
            statusText.innerText = "RECORDING...";
        } else {
            mediaRecorder.stop();
            isRecording = false;
            recordBtn.innerText = "録音スタート";
            recordBtn.classList.remove('rec-active');
            statusText.innerText = "SAVED";
        }
    };
</script>

</body>
</html>
